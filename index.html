<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SensorTower 경쟁 분석 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #273549;
            --border: #334155;
            --text: #f1f5f9;
            --muted: #64748b;
            --pubg: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 12px; color: var(--muted); margin-top: 3px; }

        /* ── Main ── */
        .main { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

        /* ── Upload ── */
        .upload-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            margin-bottom: 24px;
        }
        .upload-zone:hover, .upload-zone.over {
            border-color: var(--pubg);
            background: rgba(59,130,246,.04);
        }
        .upload-zone .up-icon { font-size: 32px; margin-bottom: 10px; }
        .upload-zone h3 { font-size: 15px; margin-bottom: 4px; }
        .upload-zone p { font-size: 13px; color: var(--muted); }

        .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
        .chip {
            background: rgba(59,130,246,.12);
            border: 1px solid rgba(59,130,246,.3);
            border-radius: 20px;
            padding: 4px 10px 4px 12px;
            font-size: 12px;
            color: #93c5fd;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chip-x { cursor: pointer; color: #64748b; font-size: 14px; transition: color .15s; }
        .chip-x:hover { color: #ef4444; }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            gap: 2px;
        }
        .tab {
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            border: 1px solid transparent;
            border-bottom: none;
            transition: color .2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--text);
            background: var(--surface);
            border-color: var(--border);
            margin-bottom: -1px;
        }
        .tab-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #22c55e;
            margin-left: 6px;
            vertical-align: middle;
            opacity: 0;
            transition: opacity .2s;
        }
        .tab.has-data .tab-dot { opacity: 1; }

        /* ── Tab content ── */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── Empty state ── */
        .empty { text-align: center; padding: 80px 0; color: var(--muted); }
        .empty .e-icon { font-size: 44px; margin-bottom: 12px; }
        .empty h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .empty p { font-size: 13px; }

        /* ── Date badge ── */
        .date-badge {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        /* ── Section label ── */
        .sec-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        /* ── Summary cards ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .card.pubg-card {
            border-color: rgba(59,130,246,.5);
            background: rgba(59,130,246,.05);
        }
        .card-title {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
        }
        .card.pubg-card .card-title { color: #93c5fd; }
        .card-title span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .c-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .card-val {
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }
        .card.pubg-card .card-val { color: #60a5fa; }
        .card-sub { font-size: 11px; color: var(--muted); }
        .vs-above { color: #f97316; }
        .vs-below { color: #475569; }
        .vs-base  { color: #22c55e; }

        /* ── Chart ── */
        .chart-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
            height: 360px;
            position: relative;
        }

        /* ── Table ── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: auto;
            max-height: 360px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            background: var(--surface2);
            padding: 10px 14px;
            text-align: right;
            font-weight: 600;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1;
        }
        thead th:first-child { text-align: left; }
        thead th.p-col { color: #93c5fd; }
        tbody tr:hover { background: rgba(255,255,255,.025); }
        tbody td {
            padding: 8px 14px;
            text-align: right;
            border-bottom: 1px solid rgba(51,65,85,.5);
            color: #94a3b8;
        }
        tbody td:first-child { text-align: left; color: var(--muted); }
        tbody td.p-col { color: #93c5fd; font-weight: 500; }
        tbody tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>SensorTower 경쟁 분석 대시보드</h1>
    <p>DAU · 다운로드 · 매출 비교 — PUBG MOBILE 기준</p>
</div>

<div class="main">

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".csv" multiple style="display:none">
        <div class="up-icon">📊</div>
        <h3>SensorTower CSV 파일 업로드</h3>
        <p>DAU · 다운로드 · 매출 파일을 드래그&amp;드롭하거나 클릭해서 선택하세요 (여러 파일 동시 가능)</p>
        <div class="chips" id="chips"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="DAU">DAU<span class="tab-dot"></span></div>
        <div class="tab" data-tab="Downloads">다운로드<span class="tab-dot"></span></div>
        <div class="tab" data-tab="Revenue">매출<span class="tab-dot"></span></div>
    </div>

    <div id="tab-DAU"       class="tab-content active"></div>
    <div id="tab-Downloads" class="tab-content"></div>
    <div id="tab-Revenue"   class="tab-content"></div>
</div>

<script>
/* ── Config ── */
const METRIC_KEYWORDS = {
    DAU:       ['DAU'],
    Downloads: ['Downloads', 'Download', '다운로드'],
    Revenue:   ['Revenue', '매출']
};

const COLORS_OTHER = ['#f97316','#ef4444','#10b981','#8b5cf6','#f59e0b','#06b6d4','#ec4899','#84cc16'];

/* ── State ── */
const state = {
    data:   { DAU: null, Downloads: null, Revenue: null },
    charts: {},
    files:  {}   // metricType → filename
};

/* ── Utils ── */
function fmt(n) {
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toLocaleString();
}
function avg(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
function isPubg(name) { return name.toUpperCase().includes('PUBG'); }

/* ── Metric detection ── */
function detectMetricFromHeaders(headers) {
    for (const [metric, kws] of Object.entries(METRIC_KEYWORDS)) {
        if (headers.some(h => kws.some(k => h.trimEnd().endsWith(k)))) return metric;
    }
    return null;
}
function detectMetricFromFilename(name) {
    const n = name.toLowerCase();
    if (n.includes('dau'))                            return 'DAU';
    if (n.includes('download') || n.includes('다운로드')) return 'Downloads';
    if (n.includes('revenue')  || n.includes('매출'))  return 'Revenue';
    return null;
}
function extractGame(col, metric) {
    for (const k of (METRIC_KEYWORDS[metric] || [])) {
        if (col.trimEnd().endsWith(' ' + k)) return col.slice(0, -(k.length + 1)).trim();
    }
    return col.trim();
}

/* ── CSV parsing ── */
function parseCSV(csvText, filename) {
    const result = Papa.parse(csvText.trim(), { header: true, skipEmptyLines: true });
    if (!result.data?.length) return { error: '데이터가 없습니다.' };

    const headers  = result.meta.fields;
    const dataCols = headers.slice(1);

    let metric = detectMetricFromHeaders(dataCols) || detectMetricFromFilename(filename);
    if (!metric) return { error: '지표 타입을 인식할 수 없습니다. (DAU / 다운로드 / 매출)' };

    const games = {};
    dataCols.forEach(h => { games[extractGame(h, metric)] = []; });

    const dates = [];
    result.data.forEach(row => {
        const vals = Object.values(row);
        dates.push(vals[0]);
        dataCols.forEach((h, i) => {
            games[extractGame(h, metric)].push(
                parseFloat(String(vals[i + 1]).replace(/,/g, '')) || 0
            );
        });
    });

    return { metric, dates, games };
}

/* ── Render ── */
function renderContent(metric) {
    const data = state.data[metric];
    const el   = document.getElementById('tab-' + metric);

    const labels = { DAU: 'DAU', Downloads: '다운로드', Revenue: '매출' };
    const icons  = { DAU: '📈',  Downloads: '⬇️',       Revenue: '💰'  };

    if (!data) {
        el.innerHTML = `
            <div class="empty">
                <div class="e-icon">${icons[metric]}</div>
                <h3>${labels[metric]} 파일을 업로드해주세요</h3>
                <p>SensorTower에서 ${labels[metric]} 데이터를 CSV로 내려받아 올려주세요</p>
            </div>`;
        return;
    }

    const gameNames = Object.keys(data.games);
    const pubgName  = gameNames.find(isPubg) || gameNames[0];
    const pubgAvg   = avg(data.games[pubgName]);

    // Sort: PUBG first, then descending by avg
    const sorted = [
        pubgName,
        ...gameNames.filter(g => g !== pubgName)
                    .sort((a, b) => avg(data.games[b]) - avg(data.games[a]))
    ];

    // Assign colors
    const colorMap = {};
    let ci = 0;
    sorted.forEach(g => {
        colorMap[g] = isPubg(g) ? '#3b82f6' : COLORS_OTHER[ci++ % COLORS_OTHER.length];
    });

    /* -- Cards -- */
    const cardsHTML = sorted.map(g => {
        const a    = avg(data.games[g]);
        const isP  = isPubg(g);
        let subHTML;
        if (isP) {
            subHTML = `<div class="card-sub vs-base">● 기준 게임</div>`;
        } else {
            const ratio = a / pubgAvg;
            const pct   = ((ratio - 1) * 100).toFixed(0);
            const sign  = ratio >= 1 ? '+' : '';
            const cls   = ratio > 1 ? 'vs-above' : 'vs-below';
            subHTML = `<div class="card-sub ${cls}">vs PUBG: ${sign}${pct}%</div>`;
        }
        return `
            <div class="card ${isP ? 'pubg-card' : ''}">
                <div class="card-title">
                    <span class="c-dot" style="background:${colorMap[g]}"></span>
                    <span>${g}</span>
                </div>
                <div class="card-val">${fmt(a)}</div>
                <div class="card-sub" style="margin-bottom:4px">기간 평균</div>
                ${subHTML}
            </div>`;
    }).join('');

    /* -- Table -- */
    const thHTML = `<th>날짜</th>` +
        sorted.map(g => `<th class="${isPubg(g) ? 'p-col' : ''}">${g}</th>`).join('');
    const trHTML = data.dates.map((d, i) =>
        `<tr><td>${d}</td>${
            sorted.map(g => `<td class="${isPubg(g) ? 'p-col' : ''}">${fmt(data.games[g][i])}</td>`).join('')
        }</tr>`
    ).join('');

    const dateRange = `📅 ${data.dates[0]} ~ ${data.dates[data.dates.length - 1]} (${data.dates.length}일)`;

    el.innerHTML = `
        <div class="date-badge">${dateRange}</div>

        <div class="sec-label">요약</div>
        <div class="cards">${cardsHTML}</div>

        <div class="sec-label">추이</div>
        <div class="chart-wrap"><canvas id="chart-${metric}"></canvas></div>

        <div class="sec-label">데이터</div>
        <div class="table-wrap">
            <table>
                <thead><tr>${thHTML}</tr></thead>
                <tbody>${trHTML}</tbody>
            </table>
        </div>`;

    /* -- Chart -- */
    if (state.charts[metric]) state.charts[metric].destroy();
    const ctx = document.getElementById('chart-' + metric).getContext('2d');
    state.charts[metric] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.dates.map(d => {
                const [, m, day] = d.split('-');
                return `${parseInt(m)}/${parseInt(day)}`;
            }),
            datasets: sorted.map(g => ({
                label:           g,
                data:            data.games[g],
                borderColor:     colorMap[g],
                backgroundColor: 'transparent',
                borderWidth:     isPubg(g) ? 3 : 1.5,
                pointRadius:     isPubg(g) ? 3 : 2,
                pointHoverRadius: 5,
                tension:         0.3,
            }))
        },
        options: {
            responsive:          true,
            maintainAspectRatio: false,
            interaction:         { mode: 'index', intersect: false },
            plugins: {
                legend: {
                    labels: { color: '#64748b', boxWidth: 12, font: { size: 12 } }
                },
                tooltip: {
                    backgroundColor: '#1e293b',
                    borderColor:     '#334155',
                    borderWidth:     1,
                    titleColor:      '#f1f5f9',
                    bodyColor:       '#94a3b8',
                    callbacks: {
                        label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.raw)}`
                    }
                }
            },
            scales: {
                x: {
                    grid:  { color: 'rgba(51,65,85,.4)' },
                    ticks: { color: '#475569', font: { size: 11 } }
                },
                y: {
                    grid:  { color: 'rgba(51,65,85,.4)' },
                    ticks: { color: '#475569', font: { size: 11 }, callback: v => fmt(v) }
                }
            }
        }
    });
}

/* ── Tab / chip helpers ── */
function updateTabs() {
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('has-data', !!state.data[t.dataset.tab]);
    });
}

function updateChips() {
    const el = document.getElementById('chips');
    el.innerHTML = Object.entries(state.files).map(([metric, fname]) => `
        <div class="chip">
            <span>${fname}</span>
            <span class="chip-x" data-metric="${metric}" title="제거">✕</span>
        </div>`).join('');
    el.querySelectorAll('.chip-x').forEach(x => {
        x.addEventListener('click', e => {
            e.stopPropagation();
            const m = x.dataset.metric;
            delete state.files[m];
            state.data[m] = null;
            updateChips();
            updateTabs();
            renderContent(m);
        });
    });
}

function switchTab(metric) {
    document.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.dataset.tab === metric));
    document.querySelectorAll('.tab-content').forEach(c =>
        c.classList.toggle('active', c.id === 'tab-' + metric));
}

/* ── File processing ── */
function processFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
            const result = parseCSV(e.target.result, file.name);
            if (result.error) { reject(result.error); return; }
            state.data[result.metric]  = { dates: result.dates, games: result.games };
            state.files[result.metric] = file.name;
            resolve(result.metric);
        };
        reader.onerror = () => reject('파일 읽기 실패');
        reader.readAsText(file, 'UTF-8');
    });
}

async function handleFiles(files) {
    for (const file of files) {
        if (!file.name.toLowerCase().endsWith('.csv')) continue;
        try {
            const metric = await processFile(file);
            updateChips();
            updateTabs();
            renderContent(metric);
            switchTab(metric);   // auto-switch to uploaded metric tab
        } catch (err) {
            alert(`⚠️ ${file.name}\n${err}`);
        }
    }
}

/* ── Events ── */
const zone  = document.getElementById('uploadZone');
const input = document.getElementById('fileInput');

zone.addEventListener('click',      () => input.click());
zone.addEventListener('dragover',   e  => { e.preventDefault(); zone.classList.add('over'); });
zone.addEventListener('dragleave',  ()  => zone.classList.remove('over'));
zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('over');
    handleFiles([...e.dataTransfer.files]);
});
input.addEventListener('change', () => {
    handleFiles([...input.files]);
    input.value = '';   // allow re-selecting same file
});

document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

/* ── Init ── */
['DAU', 'Downloads', 'Revenue'].forEach(renderContent);
</script>

</body>
</html>
